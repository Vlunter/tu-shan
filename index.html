<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>涂山星图 · 九尾天狐</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  font-family: "Microsoft YaHei", sans-serif;
  background: #000;
  color: #ffd27a;
}
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}
.container {
  position: relative;
  z-index: 1;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
h1 {
  font-size: 64px;
  font-weight: bold;
  text-shadow: 0 0 40px #ffcc66, 0 0 80px rgba(255, 204, 102, 0.4);
  margin-bottom: 12px;
}
p.subtitle {
  font-size: 18px;
  opacity: 0.85;
  margin-bottom: 50px;
  letter-spacing: 2px;
}
.groups {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
}
.group-btn {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: 2px solid rgba(255, 204, 102, 0.4);
  background: rgba(0, 0, 0, 0.5);
  color: #ffd27a;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: all 0.3s ease;
  backdrop-filter: blur(4px);
  text-decoration: none;
}
.group-btn:hover {
  transform: scale(1.08);
  border-color: #ffcc66;
  box-shadow: 0 0 30px rgba(255, 204, 102, 0.5);
  background: rgba(255, 204, 102, 0.1);
}
.group-btn span.count {
  font-size: 13px;
  margin-top: 8px;
  opacity: 0.7;
  font-weight: normal;
}
.footer {
  position: absolute;
  bottom: 30px;
  font-size: 13px;
  opacity: 0.5;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="container">
  <h1>涂山星图</h1>
  <p class="subtitle">点亮九尾天狐，汇聚涂山之力</p>

  <div class="groups">
    <a class="group-btn" href="./tushan-star.html?group=1">
      涂山一团
      <span class="count" id="count1">0 人已点亮</span>
    </a>
    <a class="group-btn" href="./tushan-star.html?group=2">
      涂山二团
      <span class="count" id="count2">0 人已点亮</span>
    </a>
    <a class="group-btn" href="./tushan-star.html?group=3">
      涂山三团
      <span class="count" id="count3">0 人已点亮</span>
    </a>
  </div>

  <div class="footer">GitHub Pages 纯前端部署 · 数据保存在本地浏览器</div>
</div>

<script>
// 读取各团已点亮人数
function updateCounts() {
  for (let i = 1; i <= 3; i++) {
    const key = 'tushan_group_' + i;
    const list = JSON.parse(localStorage.getItem(key) || '[]');
    document.getElementById('count' + i).textContent = list.length + ' 人已点亮';
  }
}
updateCounts();

// 星空背景
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let width, height, stars = [];

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * width,
    y: Math.random() * height,
    r: Math.random() * 1.5 + 0.3,
    a: Math.random(),
    speed: Math.random() * 0.02 + 0.005
  });
}

function drawBg() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, width, height);
  stars.forEach(s => {
    s.a += s.speed;
    const alpha = 0.3 + Math.abs(Math.sin(s.a)) * 0.7;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 215, 120, ${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawBg);
}
drawBg();
</script>
</body>
</html>
