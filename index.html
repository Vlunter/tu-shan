<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>涂山星图 · 九尾天狐</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #000; color: #ffd27a;
}
#canvas-container {
  position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0;
}
#motion-blur-canvas {
  position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1;
  pointer-events: none; opacity: 0.45; mix-blend-mode: screen;
}
.ui {
  position: fixed; z-index: 10; inset: 0;
  pointer-events: none;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.title-wrap {
  text-align: center; margin-bottom: 90px;
  animation: fadeInDown 2.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.title {
  font-size: 92px; font-weight: 900; letter-spacing: 18px;
  background: linear-gradient(180deg, #ffffff 0%, #fff6d0 25%, #ffcc66 55%, #ff8c42 85%, #ff5fa2 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 40px rgba(255, 180, 90, 0.7)) drop-shadow(0 0 80px rgba(255, 90, 160, 0.35));
  position: relative;
}
.title::after {
  content: attr(data-text);
  position: absolute; left: 0; top: 0; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.85), transparent);
  background-size: 200% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: scanLight 5s linear infinite;
  pointer-events: none;
}
@keyframes scanLight {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.subtitle {
  font-size: 22px; margin-top: 20px; letter-spacing: 10px;
  color: rgba(220, 240, 255, 0.9);
  text-shadow: 0 0 24px rgba(120, 190, 255, 0.55), 0 0 48px rgba(200, 160, 255, 0.25);
}
.groups {
  display: flex; gap: 110px; pointer-events: auto;
  animation: fadeInUp 2.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.planet {
  width: 200px; height: 200px; border-radius: 50%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-decoration: none; color: #fff8e8; font-size: 27px; font-weight: 800; letter-spacing: 5px;
  position: relative; transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  animation: float 6s ease-in-out infinite;
  background:
    radial-gradient(circle at 30% 25%, rgba(255, 248, 220, 0.22), rgba(255, 200, 110, 0.1) 45%, transparent 70%),
    radial-gradient(circle at 70% 75%, rgba(160, 200, 255, 0.12), transparent 55%);
  border: 1.5px solid rgba(255, 215, 140, 0.45);
  box-shadow:
    0 0 60px rgba(255, 170, 80, 0.35),
    inset 0 0 60px rgba(255, 230, 160, 0.12),
    0 0 0 1px rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(12px);
  overflow: hidden;
}
.planet::before {
  content: ''; position: absolute; inset: -30px; border-radius: 50%;
  border: 1.5px solid rgba(255, 200, 120, 0.25);
  box-shadow: 0 0 70px rgba(255, 180, 90, 0.2);
  animation: pulse 4s ease-in-out infinite;
}
.planet::after {
  content: ''; position: absolute; inset: -55px; border-radius: 50%;
  border: 1px solid rgba(120, 200, 255, 0.15);
  animation: pulse 6s ease-in-out infinite reverse;
}
.planet:nth-child(1) { animation-delay: 0s; --glow: rgba(255, 180, 80, 0.55); }
.planet:nth-child(2) { animation-delay: -2s; --glow: rgba(160, 200, 255, 0.55); }
.planet:nth-child(3) { animation-delay: -4s; --glow: rgba(255, 130, 190, 0.55); }
.planet:hover {
  transform: scale(1.18) translateY(-8px);
  border-color: rgba(255, 240, 180, 0.85);
  box-shadow:
    0 0 110px var(--glow),
    inset 0 0 90px rgba(255, 240, 180, 0.22),
    0 0 0 2px rgba(255, 255, 255, 0.12);
}
.planet .energy-ring {
  position: absolute; inset: -12px; border-radius: 50%;
  background: conic-gradient(from 0deg, transparent, rgba(255, 220, 150, 0.4), transparent, rgba(160, 210, 255, 0.35), transparent);
  animation: spin 8s linear infinite;
  opacity: 0.4;
}
.planet span.count {
  font-size: 14px; margin-top: 10px; opacity: 0.8; font-weight: 500; letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(255, 220, 160, 0.5);
}
.planet-name { position: relative; z-index: 2; }
.footer {
  position: fixed; bottom: 24px; width: 100%; text-align: center;
  font-size: 12px; opacity: 0.45; z-index: 10; letter-spacing: 2px;
  color: rgba(200, 230, 255, 0.75);
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-70px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(70px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-26px) rotate(1.5deg); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.55; }
  50% { transform: scale(1.25); opacity: 0.12; }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div id="canvas-container"></div>
<canvas id="motion-blur-canvas"></canvas>

<div class="ui">
  <div class="title-wrap">
    <h1 class="title" data-text="涂山星图">涂山星图</h1>
    <p class="subtitle">点亮九尾天狐 · 汇聚涂山之力</p>
  </div>

  <div class="groups">
    <a class="planet" href="./tushan-star.html?group=1">
      <div class="energy-ring"></div>
      <span class="planet-name">涂山一团</span>
      <span class="count" id="count1">0 人已点亮</span>

    <a class="planet" href="./tushan-star.html?group=2">
      <div class="energy-ring"></div>
      <span class="planet-name">涂山二团</span>

    </a>
    <a class="planet" href="./tushan-star.html?group=3">
      <div class="energy-ring"></div>
      <span class="planet-name">涂山三团</span>

    </a>
  </div>
</div>

<div class="footer">GitHub Pages 纯前端部署 · 数据保存在本地浏览器</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';

for (let i = 1; i <= 3; i++) {
  const list = JSON.parse(localStorage.getItem('tushan_group_' + i) || '[]');
  document.getElementById('count' + i).textContent = list.length + ' 人已点亮';
}

const container = document.getElementById('canvas-container');
const blurCanvas = document.getElementById('motion-blur-canvas');
const blurCtx = blurCanvas.getContext('2d');

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x02040a, 0.00085);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 4000);
camera.position.set(0, 0, 540);

const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance', alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

function resizeBlurCanvas() {
  blurCanvas.width = window.innerWidth;
  blurCanvas.height = window.innerHeight;
}
resizeBlurCanvas();

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.55, 0.72);
composer.addPass(bloomPass);

const chromaticAberrationShader = {
  uniforms: { tDiffuse: { value: null }, amount: { value: 0.0045 }, center: { value: new THREE.Vector2(0.5, 0.5) } },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float amount; uniform vec2 center; varying vec2 vUv;
    void main(){
      vec2 dir = vUv - center;
      float dist = length(dir);
      vec2 off = dir * amount * dist * (1.0 + dist * 1.5);
      float r = texture2D(tDiffuse, vUv + off).r;
      float g = texture2D(tDiffuse, vUv + off * 0.5).g;
      float b = texture2D(tDiffuse, vUv - off).b;
      gl_FragColor = vec4(r, g, b, 1.0);
    }
  `
};
composer.addPass(new ShaderPass(chromaticAberrationShader));

const bokehPass = new BokehPass(scene, camera, {
  focus: 540, aperture: 0.00035, maxblur: 0.009,
  width: window.innerWidth, height: window.innerHeight
});
composer.addPass(bokehPass);

const vignetteShader = {
  uniforms: { tDiffuse: { value: null }, intensity: { value: 1.2 } },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float intensity; varying vec2 vUv;
    void main(){
      vec4 c = texture2D(tDiffuse, vUv);
      vec2 uv = vUv * 2.0 - 1.0;
      float v = 1.0 - dot(uv, uv) * 0.28 * intensity;
      gl_FragColor = vec4(c.rgb * smoothstep(0.15, 1.0, v), 1.0);
    }
  `
};
composer.addPass(new ShaderPass(vignetteShader));

function createGlowTexture() {
  const c = document.createElement('canvas'); c.width = 128; c.height = 128;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(64, 64, 2, 64, 64, 62);
  g.addColorStop(0, 'rgba(255, 250, 235, 1)');
  g.addColorStop(0.25, 'rgba(255, 210, 130, 0.55)');
  g.addColorStop(0.6, 'rgba(255, 160, 90, 0.18)');
  g.addColorStop(1, 'rgba(0, 0, 0, 0)');
  x.fillStyle = g; x.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}
const glowTexture = createGlowTexture();

function createStarTexture() {
  const c = document.createElement('canvas'); c.width = 64; c.height = 64;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(32, 32, 1, 32, 32, 30);
  g.addColorStop(0, 'rgba(255, 255, 255, 1)');
  g.addColorStop(0.35, 'rgba(220, 230, 255, 0.5)');
  g.addColorStop(1, 'rgba(0, 0, 0, 0)');
  x.fillStyle = g; x.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}
const starTexture = createStarTexture();

function createNebulaTexture() {
  const c = document.createElement('canvas'); c.width = 512; c.height = 512;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(256, 256, 20, 256, 256, 230);
  g.addColorStop(0, 'rgba(180, 210, 255, 0.38)');
  g.addColorStop(0.35, 'rgba(210, 160, 255, 0.18)');
  g.addColorStop(0.65, 'rgba(255, 160, 200, 0.1)');
  g.addColorStop(1, 'rgba(0, 0, 0, 0)');
  x.fillStyle = g; x.fillRect(0, 0, 512, 512);
  return new THREE.CanvasTexture(c);
}
const nebulaTexture = createNebulaTexture();

function createInstancedStars(count, range, colors, sizes) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  const size = new Float32Array(count);
  const phase = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const r = range * (0.15 + Math.random() * 0.85);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i * 3 + 2] = r * Math.cos(phi);
    const c = new THREE.Color(colors[Math.floor(Math.random() * colors.length)]);
    col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
    size[i] = sizes[0] + Math.random() * (sizes[1] - sizes[0]);
    phase[i] = Math.random() * Math.PI * 2;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(size, 1));
  geo.setAttribute('phase', new THREE.BufferAttribute(phase, 1));
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uTexture: { value: starTexture } },
    vertexShader: `
      attribute float size; attribute float phase; varying vec3 vColor;
      uniform float uTime;
      void main(){
        vColor = color;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        float twinkle = 0.65 + 0.35 * sin(uTime * 1.8 + phase);
        gl_PointSize = size * twinkle * (420.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      uniform sampler2D uTexture; varying vec3 vColor;
      void main(){ gl_FragColor = vec4(vColor, 1.0) * texture2D(uTexture, gl_PointCoord); }
    `,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
  });
  return new THREE.Points(geo, mat);
}

const starField1 = createInstancedStars(90000, 1600, [0xffffff, 0xfff6d0, 0xd8ecff, 0xffe0f0], [1.2, 3.0]);
const starField2 = createInstancedStars(45000, 1100, [0xffdca0, 0xffaa70, 0xffeecc, 0xa0d0ff], [1.4, 3.8]);
const starField3 = createInstancedStars(18000, 850, [0xc8a8ff, 0xffa8d8, 0xa8d8ff, 0xffd0a0], [2.0, 5.5]);
scene.add(starField1, starField2, starField3);

function createGalaxy(count, arms, armWidth, radius, colors, spin) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  const size = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const arm = Math.floor(Math.random() * arms);
    const armAngle = (arm / arms) * Math.PI * 2;
    const dist = Math.pow(Math.random(), 0.7) * radius;
    const angle = armAngle + dist * 0.035 + (Math.random() - 0.5) * armWidth;
    const h = (Math.random() - 0.5) * (dist * 0.1) * Math.exp(-dist / radius);
    pos[i * 3] = Math.cos(angle) * dist;
    pos[i * 3 + 1] = h;
    pos[i * 3 + 2] = Math.sin(angle) * dist;
    const c = new THREE.Color(colors[Math.floor(Math.random() * colors.length)]);
    col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
    size[i] = 1.2 + Math.random() * 3.2;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(size, 1));
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uTexture: { value: glowTexture }, uSpin: { value: spin } },
    vertexShader: `
      attribute float size; varying vec3 vColor; uniform float uTime; uniform float uSpin;
      void main(){
        vColor = color;
        vec3 p = position;
        float a = atan(p.z, p.x);
        float r = length(p.xz);
        float angle = a + uTime * uSpin * (200.0 / (r + 60.0));
        p.x = cos(angle) * r;
        p.z = sin(angle) * r;
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = size * (520.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      uniform sampler2D uTexture; varying vec3 vColor;
      void main(){ gl_FragColor = vec4(vColor, 1.0) * texture2D(uTexture, gl_PointCoord); }
    `,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
  });
  return new THREE.Points(geo, mat);
}

const galaxy1 = createGalaxy(55000, 4, 0.55, 700, [0xa8d0ff, 0xffe0a8, 0xd0b0ff, 0xffb0d8], -0.035);
const galaxy2 = createGalaxy(32000, 3, 0.7, 480, [0x90c0ff, 0xffd0a0, 0xffa8c8], 0.05);
galaxy1.rotation.x = -0.45; galaxy1.rotation.y = 0.25;
galaxy2.rotation.x = 0.35; galaxy2.rotation.y = -0.4;
scene.add(galaxy1, galaxy2);

for (let i = 0; i < 16; i++) {
  const mat = new THREE.SpriteMaterial({
    map: nebulaTexture, transparent: true, opacity: 0.18 + Math.random() * 0.12,
    blending: THREE.AdditiveBlending, depthWrite: false, color: new THREE.Color().setHSL(0.6 + Math.random() * 0.25, 0.7, 0.6)
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(700 + Math.random() * 500, 700 + Math.random() * 500, 1);
  sprite.position.set((Math.random() - 0.5) * 1400, (Math.random() - 0.5) * 700, -250 - Math.random() * 1000);
  scene.add(sprite);
}

const auroraGeo = new THREE.PlaneGeometry(2400, 500, 128, 32);
const auroraMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uColor1: { value: new THREE.Color(0x4fd1ff) }, uColor2: { value: new THREE.Color(0xff69b4) }, uColor3: { value: new THREE.Color(0x9f7aea) } },
  vertexShader: `
    varying vec2 vUv; varying float vAlpha;
    uniform float uTime;
    void main(){
      vUv = uv;
      vec3 p = position;
      float wave = sin(p.x * 0.008 + uTime * 0.4) * 35.0 + sin(p.x * 0.018 + uTime * 0.7) * 18.0 + sin(p.x * 0.035 + uTime * 1.1) * 8.0;
      p.y += wave;
      p.z += cos(p.x * 0.012 + uTime * 0.5) * 20.0;
      vAlpha = 1.0 - abs(uv.y - 0.5) * 2.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime; uniform vec3 uColor1; uniform vec3 uColor2; uniform vec3 uColor3;
    varying vec2 vUv; varying float vAlpha;
    void main(){
      float n = sin(vUv.x * 12.0 + uTime * 0.6) * 0.5 + 0.5;
      float n2 = sin(vUv.x * 25.0 - uTime * 0.9) * 0.5 + 0.5;
      vec3 c = mix(uColor1, uColor3, n);
      c = mix(c, uColor2, n2 * 0.6);
      float a = vAlpha * (0.5 + 0.5 * sin(vUv.x * 8.0 + uTime)) * 0.22;
      gl_FragColor = vec4(c, a);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false
});
const aurora = new THREE.Mesh(auroraGeo, auroraMat);
aurora.position.set(0, -180, -600);
aurora.rotation.x = -0.1;
scene.add(aurora);

const godRayGeo = new THREE.CylinderGeometry(1, 120, 1000, 32, 1, true);
const godRayMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color(0xffcc88) } },
  vertexShader: `varying vec2 vUv; varying float vAlpha; void main(){ vUv=uv; vAlpha=1.0-uv.y; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform vec3 uColor; uniform float uTime; varying vec2 vUv; varying float vAlpha;
    void main(){
      float beam = smoothstep(0.0, 0.25, vUv.x) * smoothstep(1.0, 0.75, vUv.x);
      float pulse = 0.45 + 0.55 * sin(uTime * 1.6 + vUv.y * 12.0);
      gl_FragColor = vec4(uColor, beam * vAlpha * 0.07 * pulse);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false
});
for (let i = 0; i < 8; i++) {
  const ray = new THREE.Mesh(godRayGeo, godRayMat.clone());
  ray.material.uniforms.uColor.value = new THREE.Color(i % 2 === 0 ? 0xffcc88 : 0x8ec5ff);
  ray.position.set((Math.random() - 0.5) * 500, 350, -250 - Math.random() * 400);
  ray.rotation.z = (Math.random() - 0.5) * 0.9;
  ray.rotation.x = (Math.random() - 0.5) * 0.6;
  scene.add(ray);
}

function createLensFlare() {
  const group = new THREE.Group();
  const colors = [0xfff6d0, 0xffdca0, 0xffa0c8, 0xa0d0ff];
  const scales = [120, 60, 35, 22, 15, 10];
  scales.forEach((s, i) => {
    const mat = new THREE.SpriteMaterial({
      map: glowTexture, color: colors[i % colors.length], transparent: true,
      opacity: 0.25 - i * 0.03, blending: THREE.AdditiveBlending, depthWrite: false
    });
    const sp = new THREE.Sprite(mat);
    sp.scale.set(s * (1 + i * 0.3), s * (1 + i * 0.3), 1);
    sp.position.set((i - 2.5) * 30, (i - 2.5) * -12, 0);
    group.add(sp);
  });
  return group;
}
const lensFlare = createLensFlare();
lensFlare.position.set(-300, 180, -400);
scene.add(lensFlare);

const dustGeo = new THREE.BufferGeometry();
const dustCount = 4000;
const dustPos = new Float32Array(dustCount * 3);
const dustPhase = new Float32Array(dustCount);
for (let i = 0; i < dustCount; i++) {
  dustPos[i * 3] = (Math.random() - 0.5) * 1600;
  dustPos[i * 3 + 1] = (Math.random() - 0.5) * 900;
  dustPos[i * 3 + 2] = (Math.random() - 0.5) * 1000;
  dustPhase[i] = Math.random() * Math.PI * 2;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
dustGeo.setAttribute('phase', new THREE.BufferAttribute(dustPhase, 1));
const dustMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uTexture: { value: starTexture } },
  vertexShader: `
    attribute float phase; uniform float uTime;
    void main(){
      vec3 p = position;
      p.x += sin(uTime * 0.15 + phase) * 12.0;
      p.y += cos(uTime * 0.12 + phase) * 8.0;
      vec4 mv = modelViewMatrix * vec4(p, 1.0);
      gl_PointSize = (1.5 + sin(uTime + phase)) * (300.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `uniform sampler2D uTexture; void main(){ gl_FragColor = vec4(0.95, 0.95, 1.0, 0.8) * texture2D(uTexture, gl_PointCoord); }`,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const dustSystem = new THREE.Points(dustGeo, dustMat);
scene.add(dustSystem);

const meteors = [];
function spawnMeteor() {
  const count = 30;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i * 3] = 0; pos[i * 3 + 1] = 0; pos[i * 3 + 2] = -i * 10;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.ShaderMaterial({
    uniforms: { uColor: { value: new THREE.Color(0xfff8d0) } },
    vertexShader: `void main(){ vec4 mv=modelViewMatrix*vec4(position,1.0); gl_PointSize=max(1.5, 4.0 - position.z*0.08) * (400.0/-mv.z); gl_Position=projectionMatrix*mv; }`,
    fragmentShader: `uniform vec3 uColor; void main(){ float d=length(gl_PointCoord-0.5); gl_FragColor=vec4(uColor, smoothstep(0.5,0.0,d)); }`,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
  });
  const meteor = new THREE.Points(geo, mat);
  meteor.position.set((Math.random() - 0.5) * 1200, 350 + Math.random() * 250, (Math.random() - 0.5) * 500);
  meteor.userData = { vx: -10 - Math.random() * 10, vy: -5 - Math.random() * 6, vz: -4 - Math.random() * 4, life: 1 };
  scene.add(meteor);
  meteors.push(meteor);
}

let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth) * 2 - 1;
  mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
});

document.addEventListener('click', e => {
  spawnRipple(e.clientX, e.clientY);
});

const ripples = [];
function spawnRipple(screenX, screenY) {
  const ndc = new THREE.Vector2((screenX / window.innerWidth) * 2 - 1, -(screenY / window.innerHeight) * 2 + 1);
  const ray = new THREE.Raycaster();
  ray.setFromCamera(ndc, camera);
  const dir = ray.ray.direction.clone().normalize();
  const origin = camera.position.clone();
  const ringGeo = new THREE.RingGeometry(2, 4, 64);
  const ringMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color(0xffcc88) } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `
      uniform float uTime; uniform vec3 uColor; varying vec2 vUv;
      void main(){ float r=length(vUv-0.5)*2.0; float a=smoothstep(1.0,0.0,r) * smoothstep(0.0,0.3,abs(r-uTime)); gl_FragColor=vec4(uColor,a*0.8); }
    `,
    transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(origin).add(dir.multiplyScalar(300));
  ring.lookAt(camera.position);
  ring.userData = { birth: performance.now(), life: 1.2 };
  scene.add(ring);
  ripples.push(ring);
}

let time = 0;
let lastFrameTime = performance.now();
let frameCount = 0;

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
  lastFrameTime = now;
  time += dt;
  frameCount++;

  const breath = Math.sin(time * 0.35) * 0.5 + 0.5;
  const camZ = 540 - Math.sin(time * 0.12) * 70 - breath * 15;
  targetX += (mouseX * 55 - targetX) * 0.025;
  targetY += (mouseY * 32 - targetY) * 0.025;
  camera.position.set(targetX, targetY, camZ);
  camera.lookAt(targetX * 0.25, targetY * 0.2, -250);
  bokehPass.uniforms.focus.value = camZ + Math.sin(time * 0.5) * 40;

  [starField1, starField2, starField3, galaxy1, galaxy2, dustSystem].forEach(obj => {
    obj.material.uniforms.uTime.value = time;
  });

  starField1.rotation.y += 0.00015;
  starField2.rotation.y -= 0.00022;
  starField3.rotation.x += 0.00008;
  galaxy1.rotation.z += 0.00006;
  galaxy2.rotation.z -= 0.00009;

  aurora.material.uniforms.uTime.value = time;
  scene.children.forEach(child => {
    if (child.material && child.material.uniforms && child.material.uniforms.uTime) {
      child.material.uniforms.uTime.value = time;
    }
  });

  lensFlare.children.forEach((child, i) => {
    child.material.rotation = time * 0.05 * (i % 2 === 0 ? 1 : -1);
  });

  if (frameCount % 45 === 0) spawnMeteor();
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    m.position.x += m.userData.vx; m.position.y += m.userData.vy; m.position.z += m.userData.vz;
    m.userData.life -= dt * 0.8;
    m.material.opacity = Math.max(0, m.userData.life);
    if (m.userData.life <= 0) { scene.remove(m); meteors.splice(i, 1); }
  }

  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    const age = (now - r.userData.birth) / 1000;
    const t = age / r.userData.life;
    r.scale.setScalar(1 + t * 25);
    r.material.uniforms.uTime.value = t;
    r.material.opacity = 1 - t;
    if (t >= 1) { scene.remove(r); ripples.splice(i, 1); }
  }

  composer.render();

  blurCtx.globalAlpha = 0.28;
  blurCtx.drawImage(renderer.domElement, 0, 0, blurCanvas.width, blurCanvas.height);
  blurCtx.globalAlpha = 1;
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloomPass.setSize(window.innerWidth, window.innerHeight);
  bokehPass.setSize(window.innerWidth, window.innerHeight);
  resizeBlurCanvas();
});
</script>
</body>
