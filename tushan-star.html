<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九尾天狐星团</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  font-family: "Microsoft YaHei", sans-serif;
  background: #000;
  color: #ffd27a;
}
#bg {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}
#foxCanvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
}
.ui {
  position: fixed;
  z-index: 10;
  width: 100%;
  pointer-events: none;
}
.header {
  top: 0;
  left: 0;
  padding: 20px;
  text-align: center;
}
.header h1 {
  font-size: 36px;
  text-shadow: 0 0 20px #ffcc66;
}
.header p {
  font-size: 14px;
  opacity: 0.8;
  margin-top: 6px;
}
.controls {
  bottom: 0;
  left: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.input-row {
  display: flex;
  gap: 10px;
  pointer-events: auto;
}
input[type="text"] {
  padding: 10px 16px;
  border: 1px solid rgba(255, 204, 102, 0.5);
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.6);
  color: #ffd27a;
  font-size: 15px;
  outline: none;
  width: 200px;
}
input[type="text"]::placeholder {
  color: rgba(255, 215, 120, 0.4);
}
button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #ffd27a;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  pointer-events: auto;
}
button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255, 204, 102, 0.6);
}
.back-link {
  color: #ffd27a;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.7;
  pointer-events: auto;
}
.back-link:hover { opacity: 1; }
.tip {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="foxCanvas"></canvas>

<div class="ui header">
  <h1 id="groupTitle">涂山一团 · 九尾天狐</h1>
  <p id="groupDesc">已有 <span id="litCount">0</span> 人点亮星团</p>
</div>

<div class="ui controls">
  <div class="input-row">
    <input type="text" id="nickInput" maxlength="12" placeholder="输入你的昵称">
    <button onclick="lightUp()">点亮星团</button>
  </div>
  <div class="tip">昵称会保存在浏览器本地，下次访问依然显示</div>
  <a class="back-link" href="./index.html">← 返回涂山星图</a>
</div>

<script>
// ===== 参数与数据 =====
const params = new URLSearchParams(location.search);
const group = params.get('group') || '1';
const groupNames = {
  '1': '涂山一团',
  '2': '涂山二团',
  '3': '涂山三团'
};
document.getElementById('groupTitle').textContent = (groupNames[group] || '涂山') + ' · 九尾天狐';

const storageKey = 'tushan_group_' + group;
function getLitList() {
  try {
    return JSON.parse(localStorage.getItem(storageKey) || '[]');
  } catch (e) { return []; }
}
function saveLitList(list) {
  localStorage.setItem(storageKey, JSON.stringify(list));
}

// ===== 生成九尾天狐光点坐标 =====
const foxPoints = [];

// 身体：垂直椭圆，中心(0, 55)，宽55，高95
for (let i = 0; i < 24; i++) {
  const a = (i / 24) * Math.PI * 2;
  foxPoints.push({
    x: Math.cos(a) * 28,
    y: 55 + Math.sin(a) * 48,
    part: 'body'
  });
}

// 头部：椭圆，中心(0, -20)，宽42，高50
for (let i = 0; i < 16; i++) {
  const a = (i / 16) * Math.PI * 2;
  foxPoints.push({
    x: Math.cos(a) * 22,
    y: -20 + Math.sin(a) * 26,
    part: 'head'
  });
}

// 耳朵：两个三角形
function addEar(cx, cy, angle) {
  for (let i = 0; i < 5; i++) {
    const t = i / 4;
    foxPoints.push({
      x: cx + Math.cos(angle) * t * 22,
      y: cy + Math.sin(angle) * t * 28 - (1 - t) * 5,
      part: 'ear'
    });
  }
}
addEar(-14, -42, -0.5);
addEar(14, -42, -Math.PI + 0.5);

// 九条尾巴：从身体背部扇形展开
for (let t = 0; t < 9; t++) {
  const angle = -Math.PI / 2 - 1.1 + (t / 8) * 2.2;
  const tailLen = 115 + (t % 3) * 18;
  const bend = (t - 4) * 0.12;
  for (let i = 1; i <= 7; i++) {
    const r = (i / 7) * tailLen;
    const wave = Math.sin(i * 0.8) * 12;
    foxPoints.push({
      x: Math.cos(angle + bend * (i / 7)) * r + wave * Math.cos(angle + Math.PI / 2),
      y: 15 + Math.sin(angle + bend * (i / 7)) * r + wave * Math.sin(angle + Math.PI / 2),
      part: 'tail'
    });
  }
}

// ===== Canvas 初始化 =====
const bg = document.getElementById('bg');
const bgCtx = bg.getContext('2d');
const canvas = document.getElementById('foxCanvas');
const ctx = canvas.getContext('2d');

let width, height, cx, cy, scale;
let stars = [];

function resize() {
  width = window.innerWidth;
  height = window.innerHeight;
  bg.width = width; bg.height = height;
  canvas.width = width; canvas.height = height;
  cx = width / 2;
  cy = height / 2;
  scale = Math.min(width, height) / 360;
}
window.addEventListener('resize', resize);
resize();

// 星空背景
for (let i = 0; i < 180; i++) {
  stars.push({
    x: Math.random() * width,
    y: Math.random() * height,
    r: Math.random() * 1.2 + 0.2,
    a: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.02 + 0.005
  });
}

function drawBackground() {
  bgCtx.fillStyle = '#000';
  bgCtx.fillRect(0, 0, width, height);
  stars.forEach(s => {
    s.a += s.speed;
    const alpha = 0.3 + Math.abs(Math.sin(s.a)) * 0.6;
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(255, 215, 120, ${alpha})`;
    bgCtx.fill();
  });
  requestAnimationFrame(drawBackground);
}
drawBackground();

// 转换坐标到画布
function toCanvas(p) {
  return {
    x: cx + p.x * scale,
    y: cy + p.y * scale
  };
}

// 绘制星团
function drawFox() {
  ctx.clearRect(0, 0, width, height);
  const list = getLitList();

  // 画连线：尾巴与身体、头与身体
  ctx.strokeStyle = 'rgba(255, 204, 102, 0.12)';
  ctx.lineWidth = 1;
  for (let i = 0; i < foxPoints.length - 1; i++) {
    if (foxPoints[i].part === foxPoints[i + 1].part && foxPoints[i].part !== 'tail') {
      const p1 = toCanvas(foxPoints[i]);
      const p2 = toCanvas(foxPoints[i + 1]);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }
  }

  // 画光点
  foxPoints.forEach((p, idx) => {
    const cp = toCanvas(p);
    const lit = list.find(item => item.idx === idx);

    ctx.beginPath();
    ctx.arc(cp.x, cp.y, lit ? 5 : 2.5, 0, Math.PI * 2);
    if (lit) {
      const g = ctx.createRadialGradient(cp.x, cp.y, 1, cp.x, cp.y, 16);
      g.addColorStop(0, 'rgba(255, 220, 120, 1)');
      g.addColorStop(0.5, 'rgba(255, 180, 60, 0.4)');
      g.addColorStop(1, 'rgba(255, 180, 60, 0)');
      ctx.fillStyle = g;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(cp.x, cp.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#fff8d0';
      ctx.fill();

      // 昵称
      ctx.fillStyle = '#ffd27a';
      ctx.font = '12px Microsoft YaHei';
      ctx.textAlign = 'center';
      ctx.fillText(lit.name, cp.x, cp.y + 22);
    } else {
      ctx.fillStyle = 'rgba(255, 204, 102, 0.25)';
      ctx.fill();
    }
  });

  document.getElementById('litCount').textContent = list.length;
}

// 初始绘制
drawFox();

// ===== 点亮逻辑 =====
function lightUp() {
  const input = document.getElementById('nickInput');
  const name = input.value.trim();
  if (!name) {
    alert('请输入昵称');
    return;
  }

  const list = getLitList();
  if (list.some(item => item.name === name)) {
    alert('该昵称已经点亮过星团');
    return;
  }

  // 找一个未点亮的光点
  const usedIdx = new Set(list.map(item => item.idx));
  let idx = -1;
  for (let i = 0; i < foxPoints.length; i++) {
    if (!usedIdx.has(i)) { idx = i; break; }
  }
  if (idx === -1) {
    // 星团已满，随机覆盖一个旧的
    idx = Math.floor(Math.random() * foxPoints.length);
    const oldPos = list.findIndex(item => item.idx === idx);
    if (oldPos !== -1) list.splice(oldPos, 1);
  }

  list.push({
    name: name,
    idx: idx,
    time: Date.now()
  });

  saveLitList(list);
  input.value = '';
  drawFox();
}

// 回车点亮
document.getElementById('nickInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') lightUp();
});
</script>
</body>
</html>
